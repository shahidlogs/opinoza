<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="coin" cx="38%" cy="30%" r="75%" fx="38%" fy="30%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="42%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="edge" cx="50%" cy="50%" r="50%">
      <stop offset="80%"  stop-color="#d97706" stop-opacity="0"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Coin body -->
  <circle cx="32" cy="32" r="30" fill="url(#coin)"/>
  <!-- Coin edge shadow -->
  <circle cx="32" cy="32" r="30" fill="url(#edge)"/>
  <!-- Outer rim line -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#b45309" stroke-width="1.5" opacity="0.55"/>

  <!-- O ring — dark navy, embossed on coin -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#1e3a5f" stroke-width="7"/>
  <!-- O ring inner highlight (gives depth) -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.25"/>

  <!-- Coin shine highlight (top-left arc) -->
  <path d="M 18 20 A 17 17 0 0 1 34 14" stroke="white" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>
</svg>
