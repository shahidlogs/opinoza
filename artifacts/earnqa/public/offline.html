<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline – Opinoza</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#F8F5F0;
      color:#181C2E;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
      text-align:center;
    }
    .card{
      background:#fff;
      border:1px solid #E8E2D8;
      border-radius:16px;
      padding:40px 32px;
      max-width:360px;
      width:100%;
    }
    .coin{margin:0 auto 24px;width:64px;height:64px;}
    h1{font-size:20px;font-weight:700;margin-bottom:8px;}
    p{font-size:14px;color:#666B80;line-height:1.6;}
    button{
      margin-top:24px;
      background:linear-gradient(135deg,#f5b924,#f59320);
      color:#fff;
      border:none;
      border-radius:9999px;
      padding:10px 24px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="coin" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <defs>
        <radialGradient id="c" cx="38%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#fef3c7"/>
          <stop offset="42%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#d97706"/>
        </radialGradient>
      </defs>
      <circle cx="32" cy="32" r="30" fill="url(#c)"/>
      <circle cx="32" cy="32" r="30" fill="none" stroke="#b45309" stroke-width="1.5" opacity="0.55"/>
      <circle cx="32" cy="32" r="18" fill="none" stroke="#1e3a5f" stroke-width="7"/>
      <path d="M18 20A17 17 0 0134 14" stroke="white" stroke-width="3.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Opinoza needs internet to load questions and sync your earnings.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
