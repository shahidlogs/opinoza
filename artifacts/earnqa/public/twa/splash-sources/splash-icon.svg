<!--
  Opinoza splash icon — optimized for Android 12+ splash display.
  108dp canvas with 72dp safe zone (18dp padding each side).
  The coin fills ~70% of the safe zone for comfortable display.
  Used as: windowSplashScreenAnimatedIcon
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <defs>
    <radialGradient id="coin" cx="38%" cy="30%" r="75%" fx="38%" fy="30%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="42%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="edge" cx="50%" cy="50%" r="50%">
      <stop offset="80%"  stop-color="#d97706" stop-opacity="0"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Coin body — centered, radius 46px to leave safe-zone padding -->
  <circle cx="54" cy="54" r="46" fill="url(#coin)"/>
  <circle cx="54" cy="54" r="46" fill="url(#edge)"/>
  <circle cx="54" cy="54" r="46" fill="none" stroke="#b45309" stroke-width="2" opacity="0.55"/>

  <!-- O ring — dark navy, embossed -->
  <circle cx="54" cy="54" r="27" fill="none" stroke="#1e3a5f" stroke-width="10.5"/>
  <!-- O ring inner highlight -->
  <circle cx="54" cy="54" r="27" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.25"/>

  <!-- Shine highlight -->
  <path d="M 32 34 A 26 26 0 0 1 56 22" stroke="white" stroke-width="5" fill="none" opacity="0.45" stroke-linecap="round"/>
</svg>
